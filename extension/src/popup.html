<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Commit</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <h1 class="popup-title">Commit</h1>

    <section class="popup-section">
      <h2 class="popup-section-title">YOUR KEY</h2>
      <div class="key-display">
        <code id="public-key" class="key-value">Loading...</code>
        <button id="copy-key" class="popup-btn popup-btn--small" title="Copy full public key">Copy</button>
      </div>
    </section>

    <section class="popup-section">
      <h2 class="popup-section-title">ACTIVITY</h2>
      <div class="activity-count">
        <span id="endorsement-count" class="activity-figure">0</span>
        <span id="endorsement-label" class="activity-label">endorsements made</span>
      </div>
    </section>

    <a href="https://commit-backend.fly.dev/" target="_blank" rel="noopener" class="popup-about-link">About Commit</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
