name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      verifier: ${{ steps.filter.outputs.verifier }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            verifier:
              - 'verifier/**'

  deploy-backend:
    name: Deploy backend
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-action@1.5
        with:
          args: deploy --app commit-backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-verifier:
    name: Deploy verifier
    needs: [test, changes]
    if: needs.changes.outputs.verifier == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-action@1.5
        with:
          args: deploy --config verifier/fly.toml --app commit-verifier
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
