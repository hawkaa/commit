host: "0.0.0.0"
port: 7047
html_info: "<h1>Commit Notary Server {version}</h1><p>Public Key: <code>{public_key}</code></p><p><a href=\"/info\">/info</a> | <a href=\"/healthcheck\">/healthcheck</a></p>"
concurrency: 32

notarization:
  max_sent_data: 4096
  max_recv_data: 16384
  timeout: 1800
  private_key_path: "/root/.notary/notary.key"
  signature_algorithm: secp256k1
  allow_extensions: false

tls:
  enabled: false  # Fly.io terminates TLS

log:
  level: INFO
  filter: null
  format: COMPACT

auth:
  enabled: false
