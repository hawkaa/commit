app = 'commit-backend'
primary_region = 'arn'

[build]

[env]
  DATABASE_PATH = '/data/commit.db'
  RUST_LOG = 'commit_backend=info'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'commit_data'
  destination = '/data'
